<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Activity 4</title>
    </head>
    <body>
        <h1>User Information Form</h1>
        <form action="/action_page.php">
            <label for="fname">First name:</label>
            <input type="text" id="fname" name="firstname"><br><br>

            <label for="lname">Last name:</label>
            <input type="text" id="lname" name="lastname"><br><br>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age"><br><br>

            <label><Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="male">Female</label>
            <input type="radio" id="other" name="gender" value="other">
            <label for="male">Other</label><br><br>

            <label>Hobbies:</label><br>

            <input type="checkbox" id="hobby1" name="hobby" value="reading">
            <label for="hobby1">Reading</label><br>
            <input type="checkbox" id="hobby2" name="hobby" value="traveling">
            <label for="hobby2">Traveling</label><br>
            <input type="checkbox" id="hobby3" name="hobby" value="gaming">
            <label for="hobby3">Gaming</label><br>
            <input type="checkbox" id="hobby4" name="hobby" value="cooking">
            <label for="hobby4">Cooking</label><br>
            <input type="checkbox" id="hobby5" name="hobby" value="sports">
            <label for="hobby5">Sports</label><br><br>

            <label for="year-level">Year level:</label><br>
            <select name="year_level" id="year-level">
                <option value="1st-year">1st Year</option>
                <option value="2nt-year">2nd Year</option>
                <option value="3rd-year">3rd Year</option>
                <option value="4th-year">4th Year</option>
            </select><br><br>

            <button type="submit">Submit</button>
            <button type="reset">Clear</button>
        </form>
    </body>
</html>
